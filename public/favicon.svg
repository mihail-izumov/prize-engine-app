<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tama mascot icon — standalone idle face for PWA / Safari home-screen.
  Built from TamaMascot.vue's `idle` state (even ear variant + chevron eyes
  + gentle smile). Static, no animations.

  Design:
    • 1024×1024 canvas — scales down cleanly to 512 / 192 / 180 / 32.
    • Solid black background (ink-black #000000) — iOS auto-rounds corners.
    • White mascot body, scaled to ~70% of canvas, centered.
    • Stroke widths bumped vs in-app version (in-app uses 2.6, here 3.5)
      so eyes and mouth read clearly at 32px favicon size.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background — dark, full-bleed (iOS adds rounded corners automatically) -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!--
    Mascot body group.
    Original viewBox = 100×100. Target footprint ≈ 720×720, centered.
    Offset = (1024 - 720) / 2 = 152. Scale = 7.2.
  -->
  <g transform="translate(152, 152) scale(7.2)">

    <!-- Body path (even ear variant — tips up, symmetric) -->
    <defs>
      <clipPath id="tama-body-clip">
        <path d="M 22 56 L 22 48
                 C 22 36, 26 22, 18 4
                 L 50 40
                 L 82 4
                 C 74 22, 78 36, 78 48
                 L 78 56
                 C 78 80, 70 88, 50 88
                 C 30 88, 22 80, 22 56 Z"/>
      </clipPath>
    </defs>

    <!-- Body fill + outline -->
    <path d="M 22 56 L 22 48
             C 22 36, 26 22, 18 4
             L 50 40
             L 82 4
             C 74 22, 78 36, 78 48
             L 78 56
             C 78 80, 70 88, 50 88
             C 30 88, 22 80, 22 56 Z"
          fill="#FFFFFF" stroke="#000000" stroke-width="3"/>

    <!-- Ear tassels (black, clipped to body silhouette) -->
    <g clip-path="url(#tama-body-clip)">
      <!-- Left tassel — tip(18,4), inner(29.2, 16.6), outer(19.4, 19.4) -->
      <path d="M 18 4 L 29.2 16.6 L 19.4 19.4 Z" fill="#000000"/>
      <!-- Right tassel — tip(82,4), inner(70.8, 16.6), outer(80.6, 19.4) -->
      <path d="M 82 4 L 70.8 16.6 L 80.6 19.4 Z" fill="#000000"/>
    </g>

    <!-- Cheek dots (translucent black) -->
    <circle cx="30" cy="62" r="3.8" fill="#000000" opacity="0.15"/>
    <circle cx="70" cy="62" r="3.8" fill="#000000" opacity="0.15"/>

    <!-- Idle eyes — chevron family > < (slightly thicker than in-app for icon legibility) -->
    <path d="M 37 50 L 41 53 L 37 56"
          stroke="#000000" stroke-width="3"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 63 50 L 59 53 L 63 56"
          stroke="#000000" stroke-width="3"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Idle mouth — gentle curve, slightly thicker (2.5 vs in-app 2.0) -->
    <path d="M 46 64 Q 50 67 54 64"
          stroke="#000000" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
  </g>
</svg>
